name: Feature request
description: Suggest a public docs, release, or product information improvement.
title: "[Request]: "
labels:
  - enhancement
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Public documentation
        - Download flow
        - Release notes
        - Website link
        - Product explanation
        - Community
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is confusing, missing, or hard to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed improvement
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
